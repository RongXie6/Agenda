<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Profilo Utente</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/profilo.css">
</head>

<body>

<div class="p-box">
    <h2>Profilo Utente</h2>

    <div class="field-group">
        <label>Nome</label>
        <input type="text" id="nome" placeholder="Mario">
    </div>

    <div class="field-group">
        <label>Cognome</label>
        <input type="text" id="cognome" placeholder="Rossi">
    </div>

    <div class="field-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="mario_rossi">
    </div>

    <div class="field-group">
        <label>Email</label>
        <input type="email" id="mail" placeholder="mario@esempio.it" disabled>
    </div>

    <div class="field-group">
        <label>Telefono</label>
        <input type="tel" id="telefono" placeholder="+39 333 1234567">
    </div>

    <div class="field-group">
        <label>Nuova password (opzionale)</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button onclick="salvaProfilo()">Salva Modifiche</button>
    <button class="cancel-btn" onclick="annulla()">Annulla</button>

    <div id="message"></div>
</div>

<script src="js/profilo.js"></script>

</body>
</html>
